# Site settings — minimal, custom layouts (no theme).
title: Emaad Majeed
description: Aspiring industrial designer — portfolio
url: "https://emaadmajeed.com"
baseurl: ""

markdown: kramdown

# Content collections. Each project is one Markdown file that becomes its own page.
collections:
  projects:
    output: true
    permalink: /projects/:name/

# Give each project its layout automatically.
defaults:
  - scope: { path: "", type: "projects" }
    values: { layout: "project" }

exclude:
  - Gemfile
  - Gemfile.lock
  - README.md
